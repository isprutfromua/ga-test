name: Scale Heroku Dynos

on:
  schedule:
    # 07:00 UTC is 10:00 AM Kyiv (assuming UTC+3)
    - cron: '0 7 * * 1-5'
    # 15:00 UTC is 6:00 PM Kyiv (assuming UTC+3)
    - cron: '0 15 * * 1-5'

jobs:
  scale:
    runs-on: ubuntu-latest
    steps:
      - name: Scale Dynos
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
          APP_NAME: ${{ vars.HEROKU_APP_NAME }}
        run: |
          # Get current hour in UTC
          HOUR=$(date -u +%H)
          
          if [ "$HOUR" == "07" ]; then
            echo "Scaling up to 1 dyno..."
            curl -n -X PATCH https://api.heroku.com/apps/$APP_NAME/formation \
              -d '{ "updates": [ { "type": "web", "quantity": 1 } ] }' \
              -H "Content-Type: application/json" \
              -H "Accept: application/vnd.heroku+json; version=3" \
              -H "Authorization: Bearer $HEROKU_API_KEY"
          else
            echo "Scaling down to 0 dynos..."
            curl -n -X PATCH https://api.heroku.com/apps/$APP_NAME/formation \
              -d '{ "updates": [ { "type": "web", "quantity": 0 } ] }' \
              -H "Content-Type: application/json" \
              -H "Accept: application/vnd.heroku+json; version=3" \
              -H "Authorization: Bearer $HEROKU_API_KEY"
          fi
