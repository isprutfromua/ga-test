name: Scale Heroku Dynos

on:
  schedule:
    # 07:00 UTC is 10:00 AM Kyiv (assuming UTC+3)
    - cron: '0 7 * * 1-5'
    # 15:00 UTC is 6:00 PM Kyiv (assuming UTC+3)
    - cron: '0 15 * * 1-5'
  workflow_dispatch:
      inputs:
        action:
          description: 'Choose action'
          required: true
          default: 'up'
          type: choice
          options:
            - up
            - down
jobs:
  scale:
    runs-on: ubuntu-latest
    steps:
      - name: Scale Dynos
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
          APP_NAME: ${{ vars.HEROKU_APP_NAME }}
        run: |
          # Determine quantity based on schedule OR manual input
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TARGET_ACTION="${{ github.event.inputs.action }}"
          else
            # If scheduled, check UTC hour
            HOUR=$(date -u +%H)
            if [ "$HOUR" == "07" ]; then TARGET_ACTION="up"; else TARGET_ACTION="down"; fi
          fi

          QUANTITY=$([[ "$TARGET_ACTION" == "up" ]] && echo 1 || echo 0)
          
          echo "Setting scale to $QUANTITY..."

          curl -n https://api.heroku.com/apps/$APP_NAME/formation \
            -X PATCH \
            -H "Content-Type: application/json" \
            -H "Accept: application/vnd.heroku+json; version=3" \
            -H "Authorization: Bearer $HEROKU_API_KEY" \
            -d "{\"updates\": [{\"process\": \"web\", \"quantity\": $QUANTITY}]}"
