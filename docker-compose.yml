services:
  app:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgres://postgres:postgres@db:5432/postgres?sslmode=disable}
      REDIS_ADDR: ${DOCKER_REDIS_ADDR:-redis:6379}
      SMTP_HOST: ${DOCKER_SMTP_HOST:-mailpit}
    depends_on:
      - db
      - redis
      - mailpit
  db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
  redis:
    image: redis:7
    ports:
      - "6379:6379"
  mailpit:
    image: ghcr.io/axllent/mailpit:latest
    ports:
      - "8025:8025"
      - "1025:1025"
